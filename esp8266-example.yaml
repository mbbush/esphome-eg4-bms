substitutions:
  name: eg4-bms
  device_description: "Monitor an EG4 BMS via RS485"
  external_components_source: github://rar/esphome-eg4-bms@main
  tx_pin: GPIO1   # TX pin for ESP8266
  rx_pin: GPIO3   # RX pin for ESP8266

esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2024.6.0
  project:
    name: "rar.esphome-eg4-bms"
    version: 1.0.0

esp8266:
  board: d1_mini

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome

logger:
  level: DEBUG
  baud_rate: 0  # Disable logging to serial

# Enable Home Assistant API
api:

uart:
  id: uart_0
  baud_rate: 9600
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  rx_buffer_size: 256

eg4_modbus:
  id: modbus0
  uart_id: uart_0

eg4_bms:
  id: bms0
  address: 0x10
  eg4_modbus_id: modbus0
  update_interval: 10s

binary_sensor:
  - platform: eg4_bms
    eg4_bms_id: bms0
    online_status:
      name: "${name} online status"
    charging:
      name: "${name} charging"
    discharging:
      name: "${name} discharging"

sensor:
  - platform: eg4_bms
    eg4_bms_id: bms0
    total_voltage:
      name: "${name} total voltage"
    current:
      name: "${name} current"
    power:
      name: "${name} power"
    state_of_charge:
      name: "${name} state of charge"
    state_of_health:
      name: "${name} state of health"
    min_cell_voltage:
      name: "${name} min cell voltage"
    max_cell_voltage:
      name: "${name} max cell voltage"
    delta_cell_voltage:
      name: "${name} delta cell voltage"
    avg_temperature:
      name: "${name} avg temperature"
    max_temperature:
      name: "${name} max temperature"
    remaining_capacity:
      name: "${name} remaining capacity"
    cycle_count:
      name: "${name} cycle count"

text_sensor:
  - platform: eg4_bms
    eg4_bms_id: bms0
    status:
      name: "${name} status"
    warnings:
      name: "${name} warnings"
    protection:
      name: "${name} protection"
